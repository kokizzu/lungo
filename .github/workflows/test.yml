on: [push, pull_request]
name: Test
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Install
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Checkout
        uses: actions/checkout@v4
      - name: MongoDB
        uses: supercharge/mongodb-github-action@1.12.1
        with:
          mongodb-version: 8.0
          mongodb-replica-set: rs0
      - name: Test
        run: go test ./...
